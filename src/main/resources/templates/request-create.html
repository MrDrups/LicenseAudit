<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml" lang="ru">
<th:block th:replace="~{fragments/header :: commonHead}"></th:block>
<link rel="stylesheet" th:href="@{/css/style.css}">
<body style="background-color: #dee2e6">

<nav class="navbar navbar-light navbar-expand-lg shadow-lg rounded-bottom" style="background-color: #f8f9fa;">
    <div class="container-fluid">
        <div class="navbar-nav">
            <a th:href="@{/}" class="nav-link">
                <i class="bi bi-file-text"></i>
                Лицензии
            </a>
            <a th:href="@{/companies}" class="nav-link">
                <i class="bi bi-building"></i>
                Компании
            </a>
            <a th:href="@{/license_plans}" class="nav-link">
                <i class="bi bi-stickies"></i>
                Лицензионные планы
            </a>
            <a sec:authorize="hasRole('USER')" th:href="@{/requests}" class="nav-link">
                <i class="bi bi-plus-circle"></i>
                Мои заявки
            </a>
            <a sec:authorize="hasRole('LEAD')" th:href="@{/requests}" class="nav-link">
                <i class="bi bi-clipboard-check"></i>
                Заявки на согласование
            </a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}" class="nav-link">
                <i class="bi bi-gear"></i>
                Администрирование
            </a>
        </div>
        <form th:action="@{/logout}" method="post" class="d-inline">
            <button class="btn btn-outline-danger" type="submit">Выйти</button>
        </form>
    </div>
</nav>

<!-- WIZARD FORM -->
<div class="mt-5 shadow-lg p-4 rounded-3" style="background-color: #f8f9fa; max-width: 720px; margin-left: auto; margin-right: auto;">
    <h3 class="mb-4" style="color: black">Создать заявку на лицензию</h3>

    <!-- Wizard Steps Indicator -->
    <div class="wizard-steps mb-4">
        <div class="wizard-step active" data-step="1">
            <span class="step-number">1</span>
            <span class="step-label">Общая информация</span>
        </div>
        <div class="wizard-step" data-step="2">
            <span class="step-number">2</span>
            <span class="step-label">Данные организации</span>
        </div>
        <div class="wizard-step" data-step="3">
            <span class="step-number">3</span>
            <span class="step-label">Временные ограничения</span>
        </div>
        <div class="wizard-step" data-step="4">
            <span class="step-number">4</span>
            <span class="step-label">Комментарии</span>
        </div>
    </div>

    <form th:action="@{/requests/create}" method="post" id="requestWizardForm">
        <!-- Step 1 -->
        <div class="wizard-pane active" id="step1">
            <h6 class="mb-3"><i class="bi bi-info-circle"></i> Общая информация</h6>
            <div class="mb-3">
                <i class="bi bi-key"></i>
                <label for="key" class="form-label">Ключ лицензии <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="key" name="KEY" required>
            </div>
            <div class="mb-3">
                <i class="bi bi-building"></i>
                <label for="companyId" class="form-label">Компания <span class="text-danger">*</span></label>
                <select class="form-select" id="companyId" name="companyId" required>
                    <option value="" disabled selected>Выберите компанию</option>
                    <option th:each="company : ${companies}" th:value="${company.ID}"
                            th:data-name="${company.NAME}"
                            th:data-address="${company.ADDRESS}"
                            th:data-contact="${company.CONTACT}"
                            th:data-desc="${company.DESC}"
                            th:text="${company.NAME}"></option>
                </select>
            </div>
            <div class="mb-3">
                <i class="bi bi-stickies"></i>
                <label for="licensePlanId" class="form-label">Лицензионный план <span class="text-danger">*</span></label>
                <select class="form-select" id="licensePlanId" name="licensePlanId" required>
                    <option value="" disabled selected>Выберите план</option>
                    <option th:each="plan : ${licensePlans}" th:value="${plan.ID}" th:text="${plan.NAME}"></option>
                </select>
            </div>
        </div>

        <!-- Step 2 -->
        <div class="wizard-pane" id="step2">
            <h6 class="mb-3"><i class="bi bi-building"></i> Данные организации</h6>
            <div class="mb-3">
                <i class="bi bi-building"></i>
                <label for="orgName" class="form-label">Наименование организации</label>
                <input type="text" class="form-control" id="orgName" name="orgName" readonly placeholder="Автозаполнение из шага 1">
            </div>
            <div class="mb-3">
                <i class="bi bi-geo-alt"></i>
                <label for="orgAddress" class="form-label">Адрес</label>
                <input type="text" class="form-control" id="orgAddress" name="orgAddress" readonly placeholder="Автозаполнение из шага 1">
            </div>
            <div class="mb-3">
                <i class="bi bi-person-lines-fill"></i>
                <label for="orgContact" class="form-label">Контакт</label>
                <input type="text" class="form-control" id="orgContact" name="orgContact" readonly placeholder="Автозаполнение из шага 1">
            </div>
            <div class="mb-3">
                <i class="bi bi-card-text"></i>
                <label for="orgDesc" class="form-label">Описание</label>
                <textarea class="form-control" id="orgDesc" name="orgDesc" rows="3" readonly placeholder="Автозаполнение из шага 1"></textarea>
            </div>
        </div>

        <!-- Step 3 -->
        <div class="wizard-pane" id="step3">
            <h6 class="mb-3"><i class="bi bi-calendar-range"></i> Временные ограничения</h6>
            <div class="mb-3">
                <i class="bi bi-calendar2-plus"></i>
                <label for="startDate" class="form-label">Дата начала <span class="text-danger">*</span></label>
                <input type="date" class="form-control" id="startDate" name="START_DATE" required>
            </div>
            <div class="mb-3">
                <i class="bi bi-calendar2-minus"></i>
                <label for="endDate" class="form-label">Дата окончания <span class="text-danger">*</span></label>
                <input type="date" class="form-control" id="endDate" name="END_DATE" required>
            </div>
            <div class="mb-3">
                <i class="bi bi-bell"></i>
                <label for="notificationPeriod" class="form-label">Период отправки уведомлений</label>
                <select class="form-select" id="notificationPeriod" name="NOTIFICATION_PERIOD">
                    <option value="Нет" selected>Нет</option>
                    <option value="Да">Да</option>
                    <option value="1 день">1 день</option>
                    <option value="3 дня">3 дня</option>
                    <option value="5 дней">5 дней</option>
                    <option value="1 месяц">1 месяц</option>
                </select>
            </div>
        </div>

        <!-- Step 4 -->
        <div class="wizard-pane" id="step4">
            <h6 class="mb-3"><i class="bi bi-chat-left-text"></i> Комментарии</h6>
            <div class="mb-3">
                <label for="comment" class="form-label">Комментарий</label>
                <textarea class="form-control" id="comment" name="COMMENT" rows="5" placeholder="Опишите причину заявки..."></textarea>
            </div>
        </div>

        <!-- Navigation -->
        <div class="d-flex justify-content-between mt-4">
            <a class="btn btn-outline-secondary" th:href="@{/requests}">Отмена</a>
            <div>
                <button type="button" class="btn btn-outline-secondary" id="wizardPrev" style="display:none;">
                    <i class="bi bi-arrow-left"></i> Назад
                </button>
                <button type="button" class="btn btn-outline-primary" id="wizardNext">
                    Далее <i class="bi bi-arrow-right"></i>
                </button>
                <button type="submit" class="btn btn-primary" id="wizardSubmit" style="display:none;">
                    <i class="bi bi-send"></i> Отправить заявку
                </button>
            </div>
        </div>
    </form>
</div>

<script>
    const TOTAL_STEPS = 4;
    let currentStep = 1;

    const wizardSteps = document.querySelectorAll('.wizard-step');
    const wizardPanes = document.querySelectorAll('.wizard-pane');
    const prevBtn = document.getElementById('wizardPrev');
    const nextBtn = document.getElementById('wizardNext');
    const submitBtn = document.getElementById('wizardSubmit');

    function showStep(step) {
        wizardPanes.forEach(p => p.classList.remove('active'));
        wizardSteps.forEach(s => s.classList.remove('active', 'completed'));

        const pane = document.getElementById('step' + step);
        if (pane) pane.classList.add('active');

        wizardSteps.forEach((s, i) => {
            if (i + 1 < step) s.classList.add('completed');
            if (i + 1 === step) s.classList.add('active');
        });

        prevBtn.style.display = step > 1 ? '' : 'none';
        nextBtn.style.display = step < TOTAL_STEPS ? '' : 'none';
        submitBtn.style.display = step === TOTAL_STEPS ? '' : 'none';
    }

    function validateStep(step) {
        const pane = document.getElementById('step' + step);
        const requiredFields = pane.querySelectorAll('[required]');
        let valid = true;
        requiredFields.forEach(field => {
            if (!field.value || field.value.trim() === '') {
                field.classList.add('is-invalid');
                valid = false;
            } else {
                field.classList.remove('is-invalid');
            }
        });
        return valid;
    }

    nextBtn.addEventListener('click', function () {
        if (!validateStep(currentStep)) return;
        if (currentStep === 1) {
            const companySelect = document.getElementById('companyId');
            const selectedOption = companySelect.options[companySelect.selectedIndex];
            if (selectedOption && selectedOption.value) {
                document.getElementById('orgName').value = selectedOption.getAttribute('data-name') || selectedOption.text;
                document.getElementById('orgAddress').value = selectedOption.getAttribute('data-address') || '';
                document.getElementById('orgContact').value = selectedOption.getAttribute('data-contact') || '';
                document.getElementById('orgDesc').value = selectedOption.getAttribute('data-desc') || '';
            } else {
                document.getElementById('orgName').value = '';
                document.getElementById('orgAddress').value = '';
                document.getElementById('orgContact').value = '';
                document.getElementById('orgDesc').value = '';
            }
        }
        if (currentStep < TOTAL_STEPS) {
            currentStep++;
            showStep(currentStep);
        }
    });

    prevBtn.addEventListener('click', function () {
        if (currentStep > 1) {
            currentStep--;
            showStep(currentStep);
        }
    });
</script>

</body>
</html>
